<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftCounter - Fast Object Counting Game</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            line-height: 1.6; 
            margin: 0;
            padding: 40px 20px;
            text-align: center; 
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: #000;
        }
        .logo { 
            width: 140px; 
            border-radius: 22%; 
            margin-bottom: 25px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
        h1 { 
            font-size: 3.5em; 
            margin-bottom: 10px; 
            color: #000;
            margin-top: 0;
            text-shadow: 0 2px 4px rgba(255,255,255,0.5);
        }
        .description { 
            font-size: 1.4em; 
            color: #222; 
            margin-bottom: 25px; 
            font-weight: 600; 
            max-width: 650px;
            margin-left: auto;
            margin-right: auto;
            text-shadow: 0 1px 2px rgba(255,255,255,0.6);
        }
        /* Dil Bölümü */
        .language-container {
            margin-bottom: 40px;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }
        .language-title {
            font-weight: 700;
            margin-bottom: 15px;
            font-size: 1.1em;
            color: #333;
        }
        .lang-icons {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .lang-icons img {
            width: 32px; /* İkon boyutu buradan ayarlanabilir */
            height: 32px;
            transition: transform 0.2s;
        }
        .lang-icons img:hover {
            transform: scale(1.2);
        }
        .btn { 
            background: #000; 
            color: #fff; 
            padding: 20px 50px; 
            border-radius: 18px; 
            text-decoration: none; 
            display: inline-block; 
            font-weight: bold;
            font-size: 1.3em;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .btn:hover { transform: scale(1.05); background: #222; }
        .mockup { 
            width: 100%; 
            max-width: 750px; 
            height: auto; 
            border-radius: 20px; 
            margin-top: 50px; 
            margin-bottom: 60px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .links { 
            margin-top: 50px; 
            border-top: 2px solid rgba(0,0,0,0.1); 
            padding-top: 30px; 
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        .links a { 
            margin: 0 18px; 
            color: #000; 
            text-decoration: none; 
            font-weight: 700; 
            font-size: 1.1em;
            text-shadow: 0 1px 2px rgba(255,255,255,0.6);
        }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <img src="logo.png" alt="SwiftCounter Logo" class="logo">

    <h1>SwiftCounter</h1>
    
    <p class="description">
        Count the objects as fast as you can and break records! <br>
        A new generation gaming experience where focus meets speed.
    </p>

    <div class="language-container">
        <div class="language-title">Available in 10 languages</div>
        <div class="lang-icons">
            <img src="tur.png" alt="Turkish" title="Turkish">
            <img src="eng.png" alt="English" title="English">
            <img src="ita.png" alt="Italian" title="Italian">
            <img src="esp.png" alt="Spanish" title="Spanish">
            <img src="ger.png" alt="German" title="German">
            <img src="fra.png" alt="French" title="French">
            <img src="por.png" alt="Portuguese" title="Portuguese">
            <img src="kor.png" alt="Korean" title="Korean">
            <img src="chi.png" alt="Chinese" title="Chinese">
            <img src="jap.png" alt="Japanese" title="Japanese">
        </div>
    </div>
    
    <a href="#" class="btn">Download on the App Store (Soon)</a>

    <br>
    <img src="mockup.png" alt="SwiftCounter Game Screens" class="mockup">

    <div class="links">
        <a href="support.html">Support</a>
        <a href="privacy.html">Privacy Policy</a>
    </div>

</body>
</html>
