<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftCounter - Hızlı Nesne Sayma Oyunu</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            line-height: 1.6; 
            max-width: 800px; 
            margin: 0 auto; 
            padding: 40px; 
            text-align: center; 
            color: #333; 
            background-color: #ffffff;
        }
        .logo { 
            width: 120px; 
            border-radius: 22%; 
            margin-bottom: 20px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 { 
            font-size: 2.5em; 
            margin-bottom: 10px; 
            color: #000;
        }
        .description { 
            font-size: 1.2em; 
            color: #666; 
            margin-bottom: 30px; 
            padding: 0 20px;
        }
        .btn { 
            background: #000; 
            color: #fff; 
            padding: 15px 35px; 
            border-radius: 12px; 
            text-decoration: none; 
            display: inline-block; 
            font-weight: bold;
            font-size: 1.1em;
            transition: transform 0.2s;
        }
        .btn:hover { 
            transform: scale(1.05);
            background: #222;
        }
        .mockup { 
            width: 100%; 
            max-width: 600px; 
            height: auto; 
            border-radius: 20px; 
            margin-top: 50px; 
            margin-bottom: 50px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        .links { 
            margin-top: 40px; 
            border-top: 1px solid #eee; 
            padding-top: 25px; 
        }
        .links a { 
            margin: 0 15px; 
            color: #007aff; 
            text-decoration: none; 
            font-weight: 500; 
        }
        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <img src="logo.png" alt="SwiftCounter Logo" class="logo">

    <h1>SwiftCounter</h1>
    
    <p class="description">
        Görsellerdeki nesneleri en hızlı sen say, rekorları kır! <br>
        Dikkat ve hızın buluştuğu yeni nesil oyun deneyimi.
    </p>
    
    <a href="#" class="btn">App Store'dan İndir (Yakında)</a>

    <br>
    <img src="mockup.png" alt="SwiftCounter Oyun Ekranları" class="mockup">

    <div class="links">
        <a href="support.html">Destek (Support)</a>
        <a href="privacy.html">Gizlilik Politikası (Privacy)</a>
    </div>

</body>
</html>
