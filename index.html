<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftCounter - Fast Object Counting Game</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0;
            padding: 40px 0;
            text-align: center; 
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: #000;
        }
        .logo { 
            width: 120px; 
            border-radius: 22%; 
            margin-bottom: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
        h1 { 
            font-size: 3em; 
            margin: 0 0 10px 0;
            text-shadow: 0 2px 4px rgba(255,255,255,0.5);
        }
        .description { 
            font-size: 1.3em; 
            color: #222; 
            margin-bottom: 25px; 
            font-weight: 600; 
            max-width: 650px;
            margin-left: auto;
            margin-right: auto;
            padding: 0 20px;
        }
        .lang-icons {
            margin-bottom: 30px;
        }
        .lang-icons img {
            width: 30px;
            height: 30px;
            margin: 0 4px;
        }
        .btn { 
            background: #000; 
            color: #fff; 
            padding: 18px 45px; 
            border-radius: 15px; 
            text-decoration: none; 
            display: inline-block; 
            font-weight: bold;
            font-size: 1.2em;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            margin-bottom: 50px;
        }

        /* ABİNİN SİTESİNDEKİ GİBİ ORTALANMIŞ GALERİ */
        .gallery-wrapper {
            width: 100%;
            display: flex;
            justify-content: center; /* Masaüstünde ortalar */
            margin-bottom: 50px;
        }

        .screenshot-gallery {
            display: flex;
            overflow-x: auto; /* Mobilde yana kaydırma */
            gap: 20px;
            padding: 20px;
            max-width: 1200px; /* Galerinin çok yayılmasını engeller */
            scrollbar-width: thin;
            scrollbar-color: rgba(0,0,0,0.2) transparent;
            -webkit-overflow-scrolling: touch;
        }

        /* Kaydırma çubuğunu güzelleştirme */
        .screenshot-gallery::-webkit-scrollbar {
            height: 8px;
        }
        .screenshot-gallery::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }

        .screenshot-gallery img {
            flex: 0 0 auto;
            width: 240px; /* Abinin sitesindeki gibi ideal genişlik */
            height: auto;
            border-radius: 20px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }

        .screenshot-gallery img:hover {
            transform: scale(1.03);
        }

        .links { 
            margin-top: 20px; 
            padding-top: 30px;
            border-top: 1px solid rgba(0,0,0,0.1);
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        .links a { 
            margin: 0 15px; 
            color: #000; 
            text-decoration: none; 
            font-weight: 700;
        }
    </style>
</head>
<body>

    <img src="logo.png" alt="SwiftCounter Logo" class="logo">
    <h1>SwiftCounter</h1>
    
    <p class="description">
        Count objects at lightning speed and break records! <br>
        Play solo, join random matches, or challenge your friends.
    </p>

    <div class="lang-icons">
        <img src="eng.png" title="English">
        <img src="tur.png" title="Turkish">
        <img src="ita.png" title="Italian">
        <img src="esp.png" title="Spanish">
        <img src="ger.png" title="German">
        <img src="fra.png" title="French">
        <img src="por.png" title="Portuguese">
        <img src="kor.png" title="Korean">
        <img src="chi.png" title="Chinese">
        <img src="jap.png" title="Japanese">
    </div>
    
    <a href="#" class="btn">Download on the App Store (Soon)</a>

    <div class="gallery-wrapper">
        <div class="screenshot-gallery">
            <img src="mockup1.png" alt="Screen 1">
            <img src="mockup2.png" alt="Screen 2">
            <img src="mockup3.png" alt="Screen 3">
            <img src="mockup4.png" alt="Screen 4">
            <img src="mockup5.png" alt="Screen 5">
            <img src="mockup6.png" alt="Screen 6">
        </div>
    </div>

    <div class="links">
        <a href="support.html">Support</a>
        <a href="privacy.html">Privacy Policy</a>
    </div>

</body>
</html>
