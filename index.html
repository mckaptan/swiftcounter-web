<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftCounter - Hızlı Nesne Sayma Oyunu</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            line-height: 1.6; 
            margin: 0;
            padding: 40px 20px;
            text-align: center; 
            /* Arka plan ayarları */
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: #000; /* Yazı rengi siyah */
        }
        /* Şeffaf beyaz container kaldırıldı, içerikler doğrudan body'de */
        
        .logo { 
            width: 140px; 
            border-radius: 22%; 
            margin-bottom: 25px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
        h1 { 
            font-size: 3.5em; 
            margin-bottom: 10px; 
            color: #000;
            margin-top: 0;
            /* Arka plan üzerinde okunabilirlik için gölge */
            text-shadow: 0 2px 4px rgba(255,255,255,0.5);
        }
        .description { 
            font-size: 1.4em; 
            color: #222; 
            margin-bottom: 35px; 
            padding: 0;
            font-weight: 600; /* Daha kalın yazılar */
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            /* Arka plan üzerinde okunabilirlik için gölge */
            text-shadow: 0 1px 2px rgba(255,255,255,0.6);
        }
        .btn { 
            background: #000; 
            color: #fff; 
            padding: 20px 50px; 
            border-radius: 18px; 
            text-decoration: none; 
            display: inline-block; 
            font-weight: bold;
            font-size: 1.3em;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .btn:hover { 
            transform: scale(1.05);
            background: #222;
        }
        .mockup { 
            width: 100%; 
            max-width: 750px; 
            height: auto; 
            border-radius: 20px; 
            margin-top: 60px; 
            margin-bottom: 60px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .links { 
            margin-top: 50px; 
            border-top: 2px solid rgba(0,0,0,0.1); /* Hafif belirgin çizgi */
            padding-top: 30px; 
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        .links a { 
            margin: 0 18px; 
            color: #000; /* Link rengi siyah */
            text-decoration: none; 
            font-weight: 700; 
            font-size: 1.1em;
            /* Linkler için gölge */
            text-shadow: 0 1px 2px rgba(255,255,255,0.6);
        }
        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <img src="logo.png" alt="SwiftCounter Logo" class="logo">

    <h1>SwiftCounter</h1>
    
    <p class="description">
        Görsellerdeki nesneleri en hızlı sen say, rekorları kır! <br>
        Dikkat ve hızın buluştuğu yeni nesil oyun deneyimi.
    </p>
    
    <a href="#" class="btn">App Store'dan İndir (Yakında)</a>

    <br>
    <img src="mockup.png" alt="SwiftCounter Oyun Ekranları" class="mockup">

    <div class="links">
        <a href="support.html">Destek (Support)</a>
        <a href="privacy.html">Gizlilik Politikası (Privacy)</a>
    </div>

</body>
</html>
