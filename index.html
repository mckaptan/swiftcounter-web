<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftCounter - Fast Object Counting Game</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0;
            padding: 40px 0 0 0;
            text-align: center; 
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: #000;
        }
        .logo { 
            width: 120px; 
            border-radius: 22%; 
            margin-bottom: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            transition: transform 0.3s ease;
        }
        .logo:hover { transform: scale(1.1); }

        h1 { 
            font-size: 3em; 
            margin: 0 0 10px 0;
            text-shadow: 0 2px 4px rgba(255,255,255,0.5);
        }
        .description { 
            font-size: 1.3em; 
            color: #222; 
            margin-bottom: 25px; 
            font-weight: 600; 
            max-width: 650px;
            margin-left: auto;
            margin-right: auto;
            padding: 0 20px;
        }

        /* DİL İKONLARI VE HOVER EFEKTİ */
        .lang-icons {
            margin-bottom: 30px;
        }
        .lang-icons img {
            width: 30px;
            height: 30px;
            margin: 0 6px;
            transition: transform 0.3s ease;
            cursor: pointer;
        }
        .lang-icons img:hover {
            transform: scale(1.3);
        }

        /* MAĞAZA BUTONLARI VE HOVER EFEKTİ */
        .store-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }
        .store-btn {
            transition: transform 0.3s ease, opacity 0.2s ease;
        }
        .store-btn:hover {
            transform: scale(1.08);
        }
        .store-btn img {
            width: 200px;
            height: 80px;
            display: block;
            border-radius: 10px;
        }

        /* GALERİ VE MOCKUP BÜYÜME EFEKTİ */
        .gallery-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
        }
        .screenshot-gallery {
            display: flex;
            overflow-x: auto;
            gap: 20px;
            padding: 20px;
            max-width: 100%;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .screenshot-gallery::-webkit-scrollbar { display: none; }
        
        .screenshot-gallery img {
            flex: 0 0 auto;
            width: 240px;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.2);
            /* Büyüme efekti için geçiş süresi */
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        /* Mockuplar üzerine gelince büyüme (Hover) */
        .screenshot-gallery img:hover { 
            transform: scale(1.1) translateY(-10px); 
            z-index: 10;
        }

        /* ŞEFFAF VE KUTUSUZ FOOTER */
        .footer {
            margin-top: 60px;
            padding: 40px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1000px;
            margin-left: auto;
            margin-right: auto;
            font-size: 0.9em;
        }
        .footer-left {
            color: #444;
            font-weight: 500;
            text-shadow: 0 1px 1px rgba(255,255,255,0.5);
        }
        .footer-right a {
            margin-left: 20px;
            color: #000;
            text-decoration: none;
            font-weight: 700;
            text-shadow: 0 1px 1px rgba(255,255,255,0.5);
            transition: color 0.2s;
        }
        .footer-right a:hover { color: #555; text-decoration: underline; }

        @media (max-width: 700px) {
            .footer { flex-direction: column; gap: 20px; text-align: center; }
            .footer-right a { margin: 0 10px; }
            h1 { font-size: 2.2em; }
        }
    </style>
</head>
<body>

    <img src="logo.png" alt="SwiftCounter Logo" class="logo">
    <h1>SwiftCounter</h1>
    
    <p class="description">
        Count objects at lightning speed and break records! <br>
        Play solo, join random matches, or challenge your friends.
    </p>

    <div class="lang-icons">
        <img src="eng.png" title="English">
        <img src="tur.png" title="Turkish">
        <img src="ita.png" title="Italian">
        <img src="esp.png" title="Spanish">
        <img src="ger.png" title="German">
        <img src="fra.png" title="French">
        <img src="por.png" title="Portuguese">
        <img src="kor.png" title="Korean">
        <img src="chi.png" title="Chinese">
        <img src="jap.png" title="Japanese">
    </div>
    
    <div class="store-container">
        <a href="#" class="store-btn">
            <img src="applestore.png" alt="Download on the App Store">
        </a>
        <a href="#" class="store-btn">
            <img src="playstore.png" alt="Get it on Google Play">
        </a>
    </div>

    <div class="gallery-wrapper">
        <div class="screenshot-gallery">
            <img src="mockup1.png" alt="Screen 1">
            <img src="mockup2.png" alt="Screen 2">
            <img src="mockup3.png" alt="Screen 3">
            <img src="mockup4.png" alt="Screen 4">
            <img src="mockup5.png" alt="Screen 5">
            <img src="mockup6.png" alt="Screen 6">
        </div>
    </div>

    <div class="footer">
        <div class="footer-left">
            © 2026 SwiftCounter. All rights reserved.
        </div>
        <div class="footer-right">
            <a href="terms.html">Terms & Conditions</a>
            <a href="privacy.html">Privacy Policy</a>
            <a href="support.html">Contact</a>
        </div>
    </div>

</body>
</html>
