<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftCounter - Fast Object Counting Game</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0;
            padding: 20px 0;
            text-align: center; 
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: #000;
        }
        .logo { 
            width: 120px; 
            border-radius: 22%; 
            margin-bottom: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
        h1 { 
            font-size: 2.8em; 
            margin: 0 0 10px 0;
            text-shadow: 0 2px 4px rgba(255,255,255,0.5);
        }
        .description { 
            font-size: 1.2em; 
            color: #222; 
            margin-bottom: 20px; 
            font-weight: 600; 
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            padding: 0 20px;
        }
        .language-container {
            margin-bottom: 30px;
        }
        .lang-icons img {
            width: 28px;
            height: 28px;
            margin: 0 5px;
        }
        .btn { 
            background: #000; 
            color: #fff; 
            padding: 15px 40px; 
            border-radius: 15px; 
            text-decoration: none; 
            display: inline-block; 
            font-weight: bold;
            font-size: 1.1em;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            margin-bottom: 40px;
        }

        /* GALERİ DÜZENLEME */
        .screenshot-gallery {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding: 20px;
            margin: 0 auto 40px auto;
            max-width: 95%;
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* IE */
        }
        .screenshot-gallery::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        .screenshot-gallery img {
            flex: 0 0 auto;
            width: 220px; /* GENİŞLİĞİ SABİTLEDİK */
            height: auto;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border: 3px solid rgba(255,255,255,0.3);
        }

        .links { 
            margin-top: 30px; 
            padding: 20px;
            background: rgba(255,255,255,0.1);
        }
        .links a { 
            margin: 0 15px; 
            color: #000; 
            text-decoration: none; 
            font-weight: 700;
        }
    </style>
</head>
<body>

    <img src="logo.png" alt="SwiftCounter Logo" class="logo">
    <h1>SwiftCounter</h1>
    
    <p class="description">
        Count objects at lightning speed and break records! <br>
        Solo, random matches, or with friends.
    </p>

    <div class="language-container">
        <div class="lang-icons">
            <img src="eng.png" title="English">
            <img src="tur.png" title="Turkish">
            <img src="ita.png" title="Italian">
            <img src="esp.png" title="Spanish">
            <img src="ger.png" title="German">
            <img src="fra.png" title="French">
            <img src="por.png" title="Portuguese">
            <img src="kor.png" title="Korean">
            <img src="chi.png" title="Chinese">
            <img src="jap.png" title="Japanese">
        </div>
    </div>
    
    <a href="#" class="btn">Download on the App Store (Soon)</a>

    <div class="screenshot-gallery">
        <img src="mockup1.png">
        <img src="mockup2.png">
        <img src="mockup3.png">
        <img src="mockup4.png">
        <img src="mockup5.png">
        <img src="mockup6.png">
    </div>

    <div class="links">
        <a href="support.html">Support</a>
        <a href="privacy.html">Privacy Policy</a>
    </div>

</body>
</html>
